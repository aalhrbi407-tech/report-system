<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام متابعة التقارير المؤتمت</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#16324F; --deep:#0E2438; --deep2:#1A3E5C;
  --teal:#2D8C8A; --teal-d:#237270; --teal-soft:#E6F4F3;
  --blue:#2F6B8A; --blue-soft:#E9F2F6;
  --green:#3B8D6A; --green-soft:#E9F5EF;
  --amber:#C89B3C; --amber-soft:#FBF3E1;
  --red:#B85C5C; --red-soft:#FBECEC;
  --canvas:#EEF3F6; --card:#FFFFFF;
  --line:#E1E9EE; --line2:#EDF2F5;
  --text:#22323D; --muted:#647583; --muted2:#93A2AD;
  --shadow:0 10px 30px rgba(16,43,65,.08);
  --shadow-lg:0 20px 55px rgba(16,43,65,.16);
  --radius:18px;
  --font:"Tajawal","Segoe UI","Cairo","Tahoma","Arial",sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--font);
  background:var(--canvas);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  font-size:15px;
}
button{font-family:var(--font);cursor:pointer}
input,select,textarea{font-family:var(--font)}
a{color:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#c7d4dc;border-radius:20px;border:2px solid var(--canvas)}
::-webkit-scrollbar-track{background:transparent}

/* ---------- Buttons ---------- */
.btn{border:1px solid transparent;border-radius:12px;padding:11px 18px;font-weight:700;font-size:14px;
  display:inline-flex;align-items:center;gap:8px;transition:.15s;background:#fff;color:var(--ink);white-space:nowrap}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-primary{background:var(--teal);color:#fff;box-shadow:0 8px 20px rgba(45,140,138,.28)}
.btn-primary:hover{background:var(--teal-d)}
.btn-ink{background:var(--ink);color:#fff}
.btn-ink:hover{background:var(--deep2)}
.btn-ghost{background:#fff;border-color:var(--line);color:var(--ink)}
.btn-ghost:hover{background:#F6FAFB;border-color:#cfdbe3}
.btn-danger{background:var(--red-soft);color:var(--red);border-color:#f0d3d3}
.btn-danger:hover{background:#f6dede}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{filter:brightness(.95)}
.btn-sm{padding:7px 13px;font-size:13px;border-radius:10px}
.btn-lg{padding:14px 26px;font-size:16px}
.btn[disabled]{opacity:.5;cursor:not-allowed;transform:none}
.btn-block{width:100%;justify-content:center}

/* ---------- Badges ---------- */
.badge{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;font-size:12.5px;font-weight:700;white-space:nowrap}
.b-green{background:var(--green-soft);color:#2b6a4e}
.b-amber{background:var(--amber-soft);color:#8a6a1f}
.b-red{background:var(--red-soft);color:#9a4444}
.b-blue{background:var(--blue-soft);color:#255a76}
.b-teal{background:var(--teal-soft);color:#1f6b69}
.b-gray{background:#EDF1F4;color:#5c6b76}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}

/* ---------- Login ---------- */
.login-wrap{min-height:100vh;display:grid;grid-template-columns:1.05fr .95fr}
.login-brand{position:relative;overflow:hidden;color:#fff;
  background:radial-gradient(1000px 520px at 85% -10%,rgba(45,140,138,.55),transparent 60%),
             linear-gradient(150deg,#0E2438 0%,#153149 45%,#1E4B65 100%);
  padding:64px 60px;display:flex;flex-direction:column;justify-content:space-between}
.login-brand .lb-top{display:flex;align-items:center;gap:14px}
.brandmark{width:52px;height:52px;border-radius:15px;background:rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;font-size:26px;backdrop-filter:blur(4px)}
.login-brand h1{font-size:44px;line-height:1.25;margin:0 0 18px;font-weight:900;letter-spacing:-.5px}
.login-brand p{color:rgba(255,255,255,.82);font-size:18px;line-height:1.8;max-width:460px}
.lb-ring{position:absolute;left:-120px;bottom:-120px;opacity:.5}
.lb-points{display:flex;gap:26px;margin-top:26px;flex-wrap:wrap}
.lb-point{display:flex;align-items:center;gap:10px;font-size:15px;color:rgba(255,255,255,.9)}
.lb-point .ck{width:26px;height:26px;border-radius:8px;background:rgba(143,227,214,.2);color:#8FE3D6;
  display:flex;align-items:center;justify-content:center;font-size:14px}
.login-form{display:flex;align-items:center;justify-content:center;padding:40px}
.login-card{width:100%;max-width:410px}
.login-card h2{font-size:30px;margin:0 0 8px;color:var(--ink);font-weight:800}
.login-card .sub{color:var(--muted);margin:0 0 30px;font-size:15px}
.field{margin-bottom:18px}
.field label{display:block;font-weight:700;font-size:14px;margin-bottom:8px;color:var(--ink)}
.field input,.field select,.field textarea{width:100%;padding:13px 15px;border:1.5px solid var(--line);
  border-radius:12px;font-size:15px;background:#fff;transition:.15s;color:var(--text)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--teal);
  box-shadow:0 0 0 4px var(--teal-soft)}
.login-hint{margin-top:22px;padding:15px 16px;background:#F5F9FA;border:1px dashed #cfe0e0;border-radius:12px;font-size:13px;color:var(--muted)}
.login-hint b{color:var(--ink)}
.login-hint code{background:#fff;padding:2px 8px;border-radius:6px;border:1px solid var(--line);font-family:monospace;color:var(--teal-d)}
.err{background:var(--red-soft);color:#9a4444;padding:11px 14px;border-radius:11px;font-size:13.5px;font-weight:600;margin-bottom:16px;display:none}
.err.show{display:block}

/* ---------- App shell ---------- */
.app{display:grid;grid-template-columns:266px 1fr;min-height:100vh}
.sidebar{background:linear-gradient(180deg,#0E2438,#15334C 55%,#173A56);color:#fff;
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sb-brand{padding:22px 22px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-brand .brandmark{width:44px;height:44px;font-size:22px}
.sb-brand .t1{font-weight:800;font-size:16px;line-height:1.3}
.sb-brand .t2{font-size:11.5px;color:rgba(255,255,255,.55)}
.sb-nav{flex:1;overflow-y:auto;padding:14px 12px}
.sb-sec{font-size:11px;letter-spacing:.5px;color:rgba(255,255,255,.4);font-weight:700;padding:14px 12px 6px}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:12px;color:rgba(255,255,255,.78);
  font-weight:600;font-size:14.5px;margin-bottom:3px;border:none;background:transparent;width:100%;text-align:right;transition:.15s}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:linear-gradient(90deg,rgba(45,140,138,.32),rgba(45,140,138,.12));color:#fff;
  box-shadow:inset 3px 0 0 var(--teal)}
.nav-item .ic{width:22px;text-align:center;font-size:16px}
.nav-item .cnt{margin-inline-start:auto;background:rgba(255,255,255,.14);border-radius:999px;padding:1px 9px;font-size:11.5px}
.nav-item .cnt.red{background:var(--red);color:#fff}
.sb-user{padding:14px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:11px}
.sb-user .av{width:40px;height:40px;border-radius:11px;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
.sb-user .nm{font-weight:700;font-size:14px;line-height:1.3}
.sb-user .rl{font-size:11.5px;color:rgba(255,255,255,.55)}
.sb-user button{margin-inline-start:auto;background:rgba(255,255,255,.08);border:none;color:rgba(255,255,255,.7);
  width:34px;height:34px;border-radius:10px;font-size:15px}
.sb-user button:hover{background:rgba(184,92,92,.35);color:#fff}

.main{display:flex;flex-direction:column;min-width:0}
.topbar{background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
  padding:16px 30px;display:flex;align-items:center;gap:18px;position:sticky;top:0;z-index:20}
.topbar h1{font-size:21px;margin:0;color:var(--ink);font-weight:800}
.topbar .crumb{font-size:12.5px;color:var(--muted2);margin-bottom:2px}
.topbar-right{margin-inline-start:auto;display:flex;align-items:center;gap:12px}
.qpick{display:flex;align-items:center;gap:8px;background:#F4F8F9;border:1px solid var(--line);border-radius:12px;padding:7px 12px;font-weight:700;font-size:13.5px;color:var(--ink)}
.qpick select{border:none;background:transparent;font-weight:700;color:var(--ink);font-size:13.5px;outline:none}
.bell{position:relative;width:42px;height:42px;border-radius:12px;background:#fff;border:1px solid var(--line);font-size:17px;display:flex;align-items:center;justify-content:center}
.bell .n{position:absolute;top:-5px;left:-5px;background:var(--red);color:#fff;font-size:10.5px;font-weight:800;border-radius:999px;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.content{padding:28px 30px 60px;max-width:1360px;width:100%}

/* ---------- Cards / grid ---------- */
.grid{display:grid;gap:18px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow)}
.card.pad0{padding:0;overflow:hidden}
.card-h{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.card-h h3{margin:0;font-size:17px;color:var(--ink);font-weight:800}
.card-h .sub{font-size:12.5px;color:var(--muted)}
.card-h .act{margin-inline-start:auto;display:flex;gap:8px}
.section-title{font-size:13px;font-weight:800;color:var(--muted);letter-spacing:.3px;margin:26px 0 14px}

/* KPI */
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi .kt{font-size:13px;color:var(--muted);font-weight:700;margin-bottom:6px}
.kpi .kv{font-size:38px;font-weight:900;color:var(--ink);line-height:1}
.kpi .kf{font-size:12.5px;margin-top:9px;display:flex;align-items:center;gap:6px}
.kpi .kic{position:absolute;top:16px;left:16px;width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px}
.kpi.green .kv{color:var(--green)} .kpi.amber .kv{color:var(--amber)} .kpi.red .kv{color:var(--red)} .kpi.teal .kv{color:var(--teal-d)}
.ic-teal{background:var(--teal-soft);color:var(--teal-d)} .ic-green{background:var(--green-soft);color:var(--green)}
.ic-amber{background:var(--amber-soft);color:var(--amber)} .ic-red{background:var(--red-soft);color:var(--red)}
.ic-blue{background:var(--blue-soft);color:var(--blue)} .ic-ink{background:#E7EDF1;color:var(--ink)}

/* Table */
.table{width:100%;border-collapse:collapse;font-size:14px}
.table th{text-align:right;font-size:12.5px;color:var(--muted);font-weight:700;padding:13px 14px;border-bottom:1px solid var(--line);background:#F7FAFB;position:sticky;top:0}
.table td{padding:13px 14px;border-bottom:1px solid var(--line2);vertical-align:middle}
.table tr:last-child td{border-bottom:none}
.table tbody tr{transition:.12s}
.table tbody tr:hover{background:#F8FBFC}
.tbl-wrap{overflow-x:auto}
.uname{display:flex;align-items:center;gap:11px}
.uav{width:38px;height:38px;border-radius:11px;background:var(--teal-soft);color:var(--teal-d);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.uav.ink{background:#E7EDF1;color:var(--ink)}
.uname .nm{font-weight:700;color:var(--ink);font-size:14px}
.uname .mt{font-size:12px;color:var(--muted)}

/* progress */
.prog{height:9px;background:#E9EEF2;border-radius:999px;overflow:hidden;min-width:80px}
.prog i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--teal),var(--green));transition:width .8s cubic-bezier(.2,.8,.2,1)}
.prog.red i{background:linear-gradient(90deg,#d98a6a,var(--red))}
.prog.amber i{background:linear-gradient(90deg,#e0be6a,var(--amber))}

/* filters */
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
.filters .fsel{padding:9px 13px;border:1px solid var(--line);border-radius:11px;background:#fff;font-weight:600;font-size:13.5px;color:var(--ink)}
.search{flex:1;min-width:200px;position:relative}
.search input{width:100%;padding:10px 40px 10px 14px;border:1px solid var(--line);border-radius:11px;font-size:14px}
.search .si{position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--muted2)}

.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty .ei{font-size:44px;margin-bottom:12px;opacity:.7}
.empty h4{margin:0 0 6px;color:var(--ink);font-size:17px}

/* balance ring signature */
.ring-card{display:flex;align-items:center;gap:24px}
.ring{position:relative;width:150px;height:150px;flex-shrink:0}
.ring .lbl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .lbl .big{font-size:40px;font-weight:900;color:var(--ink);line-height:1}
.ring .lbl .cap{font-size:12px;color:var(--muted);font-weight:700;margin-top:2px}
.ringfx{transition:stroke-dashoffset 1.1s cubic-bezier(.2,.8,.2,1)}

/* mini stat rows */
.mstat{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line2)}
.mstat:last-child{border-bottom:none}
.mstat .mi{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px}
.mstat .mv{margin-inline-start:auto;font-weight:800;font-size:19px;color:var(--ink)}
.mstat .ml{font-weight:700;font-size:14px}
.mstat .md{font-size:12px;color:var(--muted)}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(14,36,56,.5);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:22px;width:100%;max-width:560px;max-height:90vh;overflow:auto;box-shadow:var(--shadow-lg);animation:pop .25s cubic-bezier(.2,.9,.3,1.2)}
.modal.wide{max-width:720px}
@keyframes pop{from{transform:scale(.94) translateY(10px);opacity:0}to{transform:scale(1);opacity:1}}
.modal-h{padding:22px 24px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:12px}
.modal-h h3{margin:0;font-size:20px;color:var(--ink);font-weight:800}
.modal-h .sub{font-size:13px;color:var(--muted);margin-top:3px}
.modal-h .x{margin-inline-start:auto;width:34px;height:34px;border-radius:10px;border:none;background:#F0F4F6;font-size:18px;color:var(--muted)}
.modal-h .x:hover{background:#e4ebee}
.modal-b{padding:24px}
.modal-f{padding:18px 24px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-start}

/* toggle */
.tg{width:46px;height:26px;border-radius:999px;background:#d3dde3;position:relative;border:none;transition:.2s;flex-shrink:0}
.tg::after{content:"";position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tg.on{background:var(--teal)}
.tg.on::after{right:23px}

/* perm matrix */
.pmatrix{width:100%;border-collapse:collapse}
.pmatrix th{padding:14px 12px;font-size:13px;color:var(--ink);font-weight:800;border-bottom:2px solid var(--line);text-align:center}
.pmatrix th:first-child{text-align:right;width:44%}
.pmatrix td{padding:12px;border-bottom:1px solid var(--line2);text-align:center}
.pmatrix td:first-child{text-align:right}
.pmatrix .pnm{font-weight:700;color:var(--ink);font-size:14px}
.pmatrix .pds{font-size:12px;color:var(--muted)}
.pcell{display:flex;justify-content:center}

/* slider */
.slider-row{margin-bottom:20px}
.slider-row .sh{display:flex;justify-content:space-between;margin-bottom:9px;align-items:center}
.slider-row .sh label{font-weight:700;font-size:14px;color:var(--ink)}
.slider-row .sh .val{font-weight:800;font-size:16px;color:var(--teal-d)}
input[type=range]{width:100%;-webkit-appearance:none;height:7px;border-radius:999px;background:#E4EBEF;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--teal);cursor:pointer;box-shadow:0 2px 6px rgba(45,140,138,.5);border:3px solid #fff}
input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--teal);cursor:pointer;border:3px solid #fff}

/* chips row */
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:14px}
.legend .lg{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted);font-weight:600}

.att{display:inline-flex;align-items:center;gap:7px;background:#F4F8F9;border:1px solid var(--line);border-radius:9px;padding:6px 11px;font-size:13px;color:var(--ink);font-weight:600;margin:3px 3px 0 0}

.toast{position:fixed;bottom:26px;left:26px;background:var(--ink);color:#fff;padding:14px 20px;border-radius:13px;
  box-shadow:var(--shadow-lg);z-index:200;font-weight:700;font-size:14px;display:flex;align-items:center;gap:10px;animation:slideup .3s}
.toast.green{background:var(--green)} .toast.red{background:var(--red)}
@keyframes slideup{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

.help{font-size:12.5px;color:var(--muted);line-height:1.7}
.divider{height:1px;background:var(--line);margin:20px 0}
.tag{display:inline-block;background:#F0F4F6;color:var(--muted);border-radius:7px;padding:3px 9px;font-size:12px;font-weight:600}

@media (max-width:1080px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr}.g2{grid-template-columns:1fr}}
@media (max-width:860px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;z-index:60;right:-280px;width:266px;transition:.25s;box-shadow:var(--shadow-lg)}
  .sidebar.open{right:0}
  .menu-btn{display:flex!important}
  .login-wrap{grid-template-columns:1fr}
  .login-brand{display:none}
}
.menu-btn{display:none;width:42px;height:42px;border-radius:12px;background:#fff;border:1px solid var(--line);font-size:19px;align-items:center;justify-content:center}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:55}
.scrim.show{display:block}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal"></div>
<div id="toast"></div>
<script>
"use strict";
/* =========================================================
   نظام متابعة التقارير المؤتمت  —  Automated Report Tracking
   Frontend (client). Talks to the Node/Express backend over /api.
   The server is the single source of truth; DB below is a
   permission-scoped snapshot fetched via /api/bootstrap.
   ========================================================= */

let DB = null;
let STATE = { view:"dashboard", quarter:null, reportFilter:{status:"all",emp:"all",q:"self"}, userSearch:"" };

/* ---------- Permissions catalog ---------- */
const PERMS = {
  manage_users:      {n:"إدارة المستخدمين", d:"إضافة وتعديل وتعطيل حسابات المستخدمين"},
  manage_permissions:{n:"إدارة الصلاحيات", d:"التحكم بصلاحيات الأدوار في النظام"},
  manage_settings:   {n:"إعدادات النظام", d:"أوزان التقييم وأنواع التقارير والأرباع"},
  assign_targets:    {n:"إسناد المستهدفات", d:"تحديد عدد التقارير المطلوبة لكل موظف"},
  review_reports:    {n:"مراجعة واعتماد التقارير", d:"اعتماد التقرير أو إعادته للتعديل"},
  view_all_reports:  {n:"عرض جميع التقارير", d:"الاطلاع على تقارير كامل الفريق"},
  view_statistics:   {n:"عرض الإحصائيات", d:"لوحات ومؤشرات الأداء العامة"},
  view_activity:     {n:"سجل النشاط", d:"تتبع كل إجراء تم في النظام"},
  submit_reports:    {n:"رفع التقارير", d:"رفع التقارير الخاصة بالموظف"}
};

async function api(path, method, body){
  const res = await fetch("/api"+path, {
    method: method||"GET",
    headers: {"Content-Type":"application/json"},
    credentials: "same-origin",
    body: body!=null ? JSON.stringify(body) : undefined
  });
  let data=null; try{ data = await res.json(); }catch(e){}
  if(!res.ok){ const err=new Error((data&&data.error)||"تعذّر تنفيذ العملية."); err.status=res.status; err.data=data; throw err; }
  return data;
}

/* =========================================================
   ACCESSORS & LOGIC
   ========================================================= */
function me(){ return DB.users.find(u=>u.id===DB.session) || null; }
function userById(id){ return DB.users.find(u=>u.id===id); }
function effectivePerms(u){
  if(!u) return [];
  const base = DB.rolePerms[u.role] || [];
  return Array.from(new Set(base.concat(u.extraPerms||[])));
}
function can(perm){ const u=me(); return u ? effectivePerms(u).includes(perm) : false; }
function employees(){ return DB.users.filter(u=>u.role==="employee"); }
function activeEmployees(){ return employees().filter(u=>u.active); }

function q(){ return STATE.quarter || CUR_Q; }
function targetOf(empId, quarter){
  const t = DB.targets.find(t=>t.employeeId===empId && t.quarter===quarter);
  return t ? t.target : 0;
}
function reportsOf(empId, quarter){
  return DB.reports.filter(r=>r.employeeId===empId && r.quarter===quarter).sort((a,b)=>a.slotNo-b.slotNo);
}
function approvedOf(empId, quarter){ return reportsOf(empId,quarter).filter(r=>r.status==="approved").length; }
function remainingOf(empId, quarter){ return Math.max(0, targetOf(empId,quarter) - approvedOf(empId,quarter)); }
function isLate(r){ return r.status!=="approved" && new Date(r.dueDate) < NOW; }
function lateCountOf(empId, quarter){ return reportsOf(empId,quarter).filter(isLate).length; }
function reviewCountOf(empId, quarter){ return reportsOf(empId,quarter).filter(r=>r.status==="review").length; }

function empStatus(empId, quarter){
  const tgt = targetOf(empId,quarter);
  if(tgt===0) return {k:"none", n:"بلا مستهدف", cls:"b-gray"};
  if(remainingOf(empId,quarter)===0) return {k:"complete", n:"مكتمل", cls:"b-green"};
  if(lateCountOf(empId,quarter)>0) return {k:"late", n:"متأخر", cls:"b-red"};
  if(reviewCountOf(empId,quarter)>0) return {k:"review", n:"قيد المراجعة", cls:"b-blue"};
  return {k:"ontrack", n:"ملتزم", cls:"b-teal"};
}
function completionPct(empId, quarter){
  const t=targetOf(empId,quarter); return t? Math.round(approvedOf(empId,quarter)/t*100):0;
}

/* ---- scoring model ---- */
function timelinessScore(r){
  if(!r.uploadDate) return 0;
  const late = daysBetween(r.dueDate, r.uploadDate); // >0 means uploaded after due
  if(late<=0) return 100;
  return Math.max(0, 100 - late*10);
}
function closureScore(r){
  const returns = (r.history||[]).filter(h=>h.action==="returned").length;
  return Math.max(0, 100 - returns*25);
}
function scoreReport(r){
  if(r.status!=="approved") return null;
  const w = DB.settings.weights;
  const t = timelinessScore(r);
  const c = r.mCompleteness!=null ? r.mCompleteness : 0;
  const qy= r.mQuality!=null ? r.mQuality : 0;
  const cl= closureScore(r);
  const total = Math.round((t*w.timeliness + c*w.completeness + qy*w.quality + cl*w.closure)/100);
  return {timeliness:t, completeness:c, quality:qy, closure:cl, total};
}
function avgQualityOf(empId, quarter){
  const done = reportsOf(empId,quarter).filter(r=>r.status==="approved");
  if(!done.length) return null;
  return Math.round(done.reduce((s,r)=>s+scoreReport(r).total,0)/done.length);
}

/* ---- team-wide aggregates for a quarter ---- */
function teamAgg(quarter){
  const emps = employees();
  let required=0, approved=0, review=0, late=0, returned=0, assigned=0;
  emps.forEach(e=>{
    required += targetOf(e.id,quarter);
    reportsOf(e.id,quarter).forEach(r=>{
      if(r.status==="approved") approved++;
      else if(r.status==="review") review++;
      else if(r.status==="returned") returned++;
      else assigned++;
      if(isLate(r)) late++;
    });
  });
  const remaining = Math.max(0, required-approved);
  const pct = required? Math.round(approved/required*100):0;
  // avg quality across all approved
  let qs=[]; emps.forEach(e=>reportsOf(e.id,quarter).filter(r=>r.status==="approved").forEach(r=>qs.push(scoreReport(r).total)));
  const avgQ = qs.length? Math.round(qs.reduce((a,b)=>a+b,0)/qs.length):0;
  return {required,approved,review,late,returned,assigned,remaining,pct,avgQ, count:qs.length};
}
function reviewQueue(quarter){
  const list=[];
  employees().forEach(e=>reportsOf(e.id,quarter).filter(r=>r.status==="review").forEach(r=>list.push(r)));
  return list.sort((a,b)=> new Date(a.uploadDate)-new Date(b.uploadDate));
}

   ========================================================= */
function ring(pct, size, color, remainingLabel){
  const r=(size/2)-10, c=2*Math.PI*r, off=c*(1-pct/100);
  return `<div class="ring" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" style="transform:rotate(90deg)">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#EAF0F3" stroke-width="14"/>
      <circle class="ringfx" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="14"
        stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"/>
    </svg>
    <div class="lbl">${remainingLabel}</div></div>`;
}
function donut(segments, size, centerTop, centerBottom){
  const total = segments.reduce((s,x)=>s+x.value,0)||1;
  const r=(size/2)-14, cx=size/2, cy=size/2, c=2*Math.PI*r;
  let acc=0, circles="";
  segments.forEach(sg=>{
    const frac=sg.value/total, dash=c*frac, gap=c-dash, offset=c*(1-acc)+ (c*0.0);
    circles += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${sg.color}" stroke-width="20"
      stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${offset}" transform="rotate(-90 ${cx} ${cy})"></circle>`;
    acc+=frac;
  });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#EEF3F5" stroke-width="20"></circle>
    ${circles}
    <text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="30" font-weight="800" fill="#16324F" font-family="Tajawal">${centerTop}</text>
    <text x="${cx}" y="${cy+20}" text-anchor="middle" font-size="12" font-weight="700" fill="#647583" font-family="Tajawal">${centerBottom}</text>
  </svg>`;
}
function hbars(items, unit){
  const max = Math.max(1, ...items.map(i=>i.value));
  return `<div style="display:flex;flex-direction:column;gap:14px">` + items.map(i=>{
    const w = Math.round(i.value/max*100);
    return `<div>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-weight:700;font-size:13.5px;color:var(--ink)">${i.label}</span>
        <span style="font-weight:800;font-size:13.5px;color:${i.color||'var(--teal-d)'}">${i.value}${unit||''}</span>
      </div>
      <div class="prog" style="height:11px"><i style="width:${w}%;background:${i.barColor||'linear-gradient(90deg,var(--teal),var(--green))'}"></i></div>
    </div>`;
  }).join("") + `</div>`;
}
function vbars(items, maxOverride, unit){
  const max = maxOverride || Math.max(1, ...items.map(i=>i.value));
  return `<div style="display:flex;align-items:flex-end;gap:16px;height:180px;padding-top:10px">` + items.map(i=>{

      <div style="font-weight:800;font-size:14px;color:var(--ink)">${i.value}${unit||''}</div>
      <div style="width:100%;max-width:56px;height:${h}px;border-radius:11px 11px 4px 4px;background:${i.color||'linear-gradient(180deg,#3f9a97,#2D8C8A)'};transition:height .8s"></div>

    </div>`;
  }).join("") + `</div>`;
}

async function doLogin(){
  const u=document.getElementById("lu").value.trim();
  const p=document.getElementById("lp").value;
  const err=document.getElementById("loginErr");
  const btn=document.getElementById("loginBtn");
  err.classList.remove("show");
  if(btn){ btn.disabled=true; btn.textContent="جارٍ الدخول..."; }
  try{
    await api("/login","POST",{username:u,password:p});
    STATE.view="dashboard"; STATE.quarter=null;
    await refresh();
  }catch(e){
    err.textContent=e.message||"تعذّر تسجيل الدخول."; err.classList.add("show");
    if(btn){ btn.disabled=false; btn.textContent="دخول النظام"; }
  }
}
async function logout(){
  try{ await api("/logout","POST"); }catch(e){}
  DB=null; render();
}

/* =========================================================

const NAV = [
  {sec:"الرئيسية"},
  {v:"dashboard", ic:"🏠", n:"لوحة المتابعة", perm:null},
  {v:"myreports", ic:"📥", n:"تقاريري", perm:"submit_reports", empOnly:true},
  {sec:"المتابعة"},
  {v:"reports", ic:"📄", n:"التقارير", perm:"view_all_reports"},
  {v:"review", ic:"✅", n:"مراجعة واعتماد", perm:"review_reports", badge:"review"},
  {v:"targets", ic:"🎯", n:"المستهدفات", perm:"assign_targets"},
  {v:"statistics", ic:"📊", n:"الإحصائيات", perm:"view_statistics"},
  {sec:"الإدارة"},
  {v:"users", ic:"👥", n:"المستخدمون", perm:"manage_users"},
  {v:"permissions", ic:"🔑", n:"الصلاحيات", perm:"manage_permissions"},
  {v:"settings", ic:"⚙️", n:"الإعدادات", perm:"manage_settings"},
  {v:"activity", ic:"🕓", n:"سجل النشاط", perm:"view_activity"}
];
function navAllowed(item){
  if(item.sec) return true;
  const u=me();
  if(item.empOnly && u.role!=="employee") return false;
  if(item.v==="dashboard") return true;
  if(!item.perm) return true;
  return can(item.perm);
}
function pageTitle(v){
  const map={dashboard:"لوحة المتابعة",myreports:"تقاريري",reports:"جميع التقارير",review:"مراجعة واعتماد",
    targets:"إسناد المستهدفات",statistics:"الإحصائيات والمؤشرات",users:"إدارة المستخدمين",
    permissions:"إدارة الصلاحيات",settings:"إعدادات النظام",activity:"سجل النشاط"};
  return map[v]||"";
}
function crumbOf(v){
  if(["users","permissions","settings","activity"].includes(v)) return "الإدارة";
  if(["reports","review","targets","statistics"].includes(v)) return "المتابعة";
  return "الرئيسية";
}

function shell(inner){
  const u=me();
  const rq = reviewQueue(q()).length;
  let nav="";
  NAV.forEach(item=>{
    if(item.sec){ nav+=`<div class="sb-sec">${item.sec}</div>`; return; }
    if(!navAllowed(item)) return;
    let badge="";
    if(item.badge==="review" && rq>0) badge=`<span class="cnt red">${rq}</span>`;
    nav+=`<button class="nav-item ${STATE.view===item.v?'active':''}" onclick="go('${item.v}')">
      <span class="ic">${item.ic}</span><span>${item.n}</span>${badge}</button>`;
  });
  const qOptions = QUARTERS.map(x=>`<option value="${x.id}" ${x.id===q()?'selected':''}>${x.n}</option>`).join("");
  const notif = notifCount();
  return `<div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sb-brand"><div class="brandmark">📊</div>
        <div><div class="t1">متابعة التقارير</div><div class="t2">${DB.settings.program}</div></div></div>

function go(v){ STATE.view=v; const sb=document.getElementById("sidebar"); if(sb)sb.classList.remove("open"); const sc=document.getElementById("scrim"); if(sc)sc.classList.remove("show"); render(); }

function notifCount(){
  const u=me();
  if(u.role==="employee"){
    return reportsOf(u.id,q()).filter(r=>isLate(r)||r.status==="returned").length;
  }

}

/* =========================================================
   REPORTS (all) + filters
   ========================================================= */
function allReportsForQuarter(quarter){
  const list=[];
  DB.reports.filter(r=>r.quarter===quarter).forEach(r=>list.push(r));
  return list.sort((a,b)=>{
    const oa={late:0,review:1,returned:2,assigned:3,approved:4}[isLate(a)?'late':a.status];
    const ob={late:0,review:1,returned:2,assigned:3,approved:4}[isLate(b)?'late':b.status];
    return oa-ob;
  });
}
function reportRow(r,showEmp){
  const e=userById(r.employeeId); const m=statusMeta(r); const sc=scoreReport(r);
  const canReview = r.status==="review" && can("review_reports");
  return `<tr>
    ${showEmp?`<td><div class="uname"><div class="uav">${initials(e.name)}</div><div><div class="nm">${e.name}</div><div class="mt">${e.dept||''}</div></div></div></td>`:''}
    <td><div style="font-weight:700;color:var(--ink)">${r.title}</div>
        <div style="font-size:12px;color:var(--muted)">${(DB.reportTypes.find(t=>t.id===r.typeId)||{}).n||''}</div></td>
    <td>${fmtShort(r.dueDate)}</td>
    <td>${r.uploadDate?fmtShort(r.uploadDate):'<span style="color:var(--muted2)">—</span>'}</td>
    <td>${sc?`<span style="font-weight:800;color:${sc.total>=85?'var(--green)':sc.total>=70?'var(--amber)':'var(--red)'}">${sc.total}%</span>`:'<span style="color:var(--muted2)">—</span>'}</td>
    <td><span class="badge ${m.cls}">${m.n}</span></td>
    <td style="text-align:left">
      ${canReview?`<button class="btn btn-primary btn-sm" onclick="openReview('${r.id}')">مراجعة</button>`
        :`<button class="btn btn-ghost btn-sm" onclick="openReport('${r.id}')">تفاصيل</button>`}</td>
  </tr>`;
}
function reportsView(){
  const quarter=q();
  let list=allReportsForQuarter(quarter);
  const f=STATE.reportFilter;
  if(f.status!=="all") list=list.filter(r=> f.status==="late"?isLate(r): (r.status===f.status && !(f.status!=="approved"&&false)) );
  if(f.emp!=="all") list=list.filter(r=>r.employeeId===f.emp);
  const empOpts=`<option value="all">كل الموظفين</option>`+activeEmployees().map(e=>`<option value="${e.id}" ${f.emp===e.id?'selected':''}>${e.name}</option>`).join("");

/* =========================================================

function openSubmit(rid){
  const r=DB.reports.find(x=>x.id===rid); if(!r) return;
  openModal(`
    <div class="modal-h"><div><h3>رفع التقرير</h3><div class="sub">${r.title} • استحقاق ${fmtDate(r.dueDate)}</div></div>

    <div class="modal-b">
      <div class="field"><label>ملخص التقرير / أبرز الملاحظات</label>
        <textarea id="sm_note" rows="4" placeholder="اكتب أبرز نتائج الزيارة والمؤشرات المرصودة..."></textarea></div>
      <div class="field"><label>المرفقات</label>
        <div id="sm_atts">${(r.attachments||[]).map(a=>`<span class="att">📎 ${a.name}</span>`).join("")}</div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <input id="sm_file" type="text" placeholder="اسم الملف، مثل: تقرير_الزيارة.pdf" style="flex:1;padding:10px 13px;border:1px solid var(--line);border-radius:10px">

        <div class="help" style="margin-top:6px">نموذج توضيحي: تُسجَّل أسماء الملفات فقط لأغراض العرض.</div></div>
      ${isLate(r)?`<div style="padding:11px 14px;background:var(--red-soft);border-radius:11px;color:#9a4444;font-size:13px;font-weight:600">⏰ هذا التقرير تجاوز موعد استحقاقه — سيؤثر التأخير على درجة الالتزام الزمني.</div>`:''}
    </div>
    <div class="modal-f">
      <button class="btn btn-primary" onclick="submitReport('${r.id}')">تأكيد الرفع للمراجعة</button>
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button></div>`);
}
function addAtt(rid){
  const r=DB.reports.find(x=>x.id===rid); const inp=document.getElementById("sm_file");
  const name=(inp.value||"").trim(); if(!name) return;
  r.attachments=r.attachments||[]; r.attachments.push({name}); inp.value="";
  document.getElementById("sm_atts").innerHTML=r.attachments.map(a=>`<span class="att">📎 ${a.name}</span>`).join("");
}
async function submitReport(rid){
  const r=DB.reports.find(x=>x.id===rid); if(!r) return;
  try{
    await api(`/reports/${rid}/submit`,"POST",{attachments:r.attachments||[]});
    closeModal(); await refresh(); toast("تم رفع التقرير للمراجعة","green");
  }catch(e){ toast(e.message,"red"); }
}

function openReview(rid){
  const r=DB.reports.find(x=>x.id===rid); if(!r) return;
  const e=userById(r.employeeId);
  const tl=timelinessScore(r); const cl=closureScore(r);
  const w=DB.settings.weights;
  openModal(`
    <div class="modal-h"><div><h3>مراجعة واعتماد</h3><div class="sub">${r.title} • ${e.name}</div></div>
      <button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-b">
      <div class="grid g2" style="gap:12px;margin-bottom:18px">
        <div style="padding:12px 14px;background:#F5F9FA;border-radius:11px">
          <div class="help">تاريخ الرفع</div><div style="font-weight:700;color:var(--ink)">${fmtDate(r.uploadDate)}</div></div>
        <div style="padding:12px 14px;background:#F5F9FA;border-radius:11px">
          <div class="help">الاستحقاق</div><div style="font-weight:700;color:${isLate(r)?'var(--red)':'var(--ink)'}">${fmtDate(r.dueDate)} ${isLate(r)?'(متأخر)':''}</div></div>
      </div>
      ${(r.attachments||[]).length?`<div style="margin-bottom:16px">${r.attachments.map(a=>`<span class="att">📎 ${a.name}</span>`).join("")}</div>`:''}

      <div class="slider-row"><div class="sh"><label>اكتمال التقرير (وزن ${w.completeness}%)</label><span class="val" id="rv_cv">88%</span></div>
        <input type="range" id="rv_c" min="0" max="100" value="88" oninput="document.getElementById('rv_cv').textContent=this.value+'%';previewScore()"></div>
      <div class="slider-row"><div class="sh"><label>جودة التحليل (وزن ${w.quality}%)</label><span class="val" id="rv_qv">85%</span></div>
        <input type="range" id="rv_q" min="0" max="100" value="85" oninput="document.getElementById('rv_qv').textContent=this.value+'%';previewScore()"></div>

      <div style="display:flex;gap:12px;margin:16px 0">
        <div style="flex:1;padding:12px;background:var(--teal-soft);border-radius:11px;text-align:center">
          <div class="help">الالتزام الزمني (آلي)</div><div style="font-weight:800;color:var(--teal-d);font-size:18px">${tl}%</div></div>
        <div style="flex:1;padding:12px;background:var(--teal-soft);border-radius:11px;text-align:center">
          <div class="help">كفاءة الإغلاق (آلي)</div><div style="font-weight:800;color:var(--teal-d);font-size:18px">${cl}%</div></div>
        <div style="flex:1;padding:12px;background:var(--ink);border-radius:11px;text-align:center;color:#fff">
          <div style="color:rgba(255,255,255,.7);font-size:12px">التقييم الكلي</div><div style="font-weight:900;font-size:22px" id="rv_total">—</div></div>
      </div>

      <div class="field"><label>ملاحظات الإعادة (مطلوبة عند الإعادة فقط)</label>
        <textarea id="rv_reason" rows="2" placeholder="حدّد ما يجب تصحيحه إن كنت ستعيد التقرير..."></textarea></div>
    </div>
    <div class="modal-f">
      <button class="btn btn-green" onclick="approveReport('${r.id}')">اعتماد وخصم من الرصيد</button>
      <button class="btn btn-danger" onclick="returnReport('${r.id}')">إعادة للتعديل</button>
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button></div>`);
  window.__revCtx={tl,cl}; previewScore();
}
function previewScore(){
  const c=+document.getElementById("rv_c").value, qy=+document.getElementById("rv_q").value;
  const {tl,cl}=window.__revCtx; const w=DB.settings.weights;
  const total=Math.round((tl*w.timeliness+c*w.completeness+qy*w.quality+cl*w.closure)/100);
  document.getElementById("rv_total").textContent=total+"%";
}
async function approveReport(rid){
  const r=DB.reports.find(x=>x.id===rid); if(!r) return;
  const c=+document.getElementById("rv_c").value, qy=+document.getElementById("rv_q").value;
  const e=userById(r.employeeId);
  try{
    await api(`/reports/${rid}/approve`,"POST",{completeness:c,quality:qy});
    closeModal(); await refresh();
    toast(`تم الاعتماد — تبقّى ${remainingOf(r.employeeId,r.quarter)} على ${e?e.name:''}`,"green");
  }catch(err){ toast(err.message,"red"); }
}
async function returnReport(rid){
  const reason=(document.getElementById("rv_reason").value||"").trim();
  if(!reason){ toast("سبب الإعادة إلزامي","red"); return; }
  try{
    await api(`/reports/${rid}/return`,"POST",{reason});
    closeModal(); await refresh(); toast("أُعيد التقرير للموظف للتعديل","");
  }catch(err){ toast(err.message,"red"); }
}
function openReport(rid){
  const r=DB.reports.find(x=>x.id===rid); if(!r) return;
  const e=userById(r.employeeId); const m=statusMeta(r); const sc=scoreReport(r);
  const hist=(r.history||[]).map(h=>{const actor=userById(h.actor); const map={submitted:"رفع التقرير",approved:"اعتماد",returned:"إعادة للتعديل"};
    return `<div class="mstat"><div class="mi ic-blue">•</div><div><div class="ml">${map[h.action]||h.action}</div><div class="md">${actor?actor.name:''} • ${fmtDate(h.ts)}${h.note?' — '+h.note:''}</div></div></div>`;}).join("");
  openModal(`
    <div class="modal-h"><div><h3>${r.title}</h3><div class="sub">${e.name} • ${e.dept||''}</div></div>
      <button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-b">
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">
        <span class="badge ${m.cls}">${m.n}</span>
        <span class="tag">استحقاق ${fmtShort(r.dueDate)}</span>
        ${r.uploadDate?`<span class="tag">رُفع ${fmtShort(r.uploadDate)}</span>`:''}
        ${sc?`<span class="badge b-teal">التقييم ${sc.total}%</span>`:''}
      </div>
      ${sc?`<div class="grid g4" style="gap:10px;margin-bottom:16px">
        ${[["الالتزام الزمني",sc.timeliness],["الاكتمال",sc.completeness],["الجودة",sc.quality],["كفاءة الإغلاق",sc.closure]].map(x=>`<div style="padding:12px;background:#F5F9FA;border-radius:11px;text-align:center"><div class="help">${x[0]}</div><div style="font-weight:800;color:var(--ink);font-size:17px">${x[1]}%</div></div>`).join("")}
      </div>`:''}
      ${r.returnReason?`<div style="margin-bottom:16px;padding:12px 14px;background:var(--amber-soft);border-radius:11px;color:#8a6a1f;font-size:13px"><b>سبب الإعادة:</b> ${r.returnReason}</div>`:''}
      ${(r.attachments||[]).length?`<div style="margin-bottom:16px">${r.attachments.map(a=>`<span class="att">📎 ${a.name}</span>`).join("")}</div>`:''}
      <div class="section-title" style="margin:6px 0 4px">سجل الإجراءات</div>
      ${hist||'<p class="help">لا توجد إجراءات بعد.</p>'}
    </div>
    <div class="modal-f">
      ${r.status==="review"&&can("review_reports")?`<button class="btn btn-primary" onclick="openReview('${r.id}')">مراجعة واعتماد</button>`:''}
      <button class="btn btn-ghost" onclick="closeModal()">إغلاق</button></div>`);
}

  const u = id?DB.users.find(x=>x.id===id):null;
  const isNew=!u;
  const roleOpts=Object.keys(ROLE_LABEL).map(r=>`<option value="${r}" ${u&&u.role===r?'selected':''}>${ROLE_LABEL[r]}</option>`).join("");
  const permChecks=Object.keys(PERMS).map(k=>{
    const base=(u?DB.rolePerms[u.role]:DEFAULT_ROLE_PERMS.employee).includes(k);
    const extra=u&&(u.extraPerms||[]).includes(k);
    return `<label style="display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid var(--line);border-radius:10px;font-size:13px;cursor:pointer">
      <input type="checkbox" class="up_extra" value="${k}" ${extra?'checked':''} ${base?'disabled title="مضمّنة في الدور"':''} style="width:16px;height:16px">
      <span style="${base?'color:var(--muted)':''}">${PERMS[k].n}${base?' <span class="tag" style="font-size:10px">من الدور</span>':''}</span></label>`;
  }).join("");
  openModal(`
    <div class="modal-h"><div><h3>${isNew?'مستخدم جديد':'تعديل المستخدم'}</h3><div class="sub">${isNew?'أنشئ حسابًا وامنحه دورًا وصلاحيات':u.name}</div></div>
      <button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-b">
      <div class="grid g2" style="gap:14px">
        <div class="field"><label>الاسم الكامل</label><input id="uf_name" value="${u?u.name:''}" placeholder="مثال: محمد العبدالله"></div>
        <div class="field"><label>المسمى الوظيفي</label><input id="uf_title" value="${u?u.title||'':''}" placeholder="مقيّم / مشرف"></div>
        <div class="field"><label>اسم المستخدم</label><input id="uf_user" value="${u?u.username:''}" placeholder="username"></div>
        <div class="field"><label>الإدارة</label><input id="uf_dept" value="${u?u.dept||'':''}" placeholder="الإدارة / الفريق"></div>
        <div class="field"><label>كلمة المرور ${u?'(اتركها فارغة للإبقاء)':''}</label><input id="uf_pass" type="text" placeholder="••••••"></div>
        <div class="field"><label>الدور</label><select id="uf_role">${roleOpts}</select></div>
      </div>
      <div class="section-title" style="margin:10px 0 10px">صلاحيات إضافية (فوق صلاحيات الدور)</div>
      <div class="grid g2" style="gap:8px">${permChecks}</div>
    </div>
    <div class="modal-f">
      <button class="btn btn-primary" onclick="saveUser(${u?`'${u.id}'`:'null'})">${isNew?'إنشاء الحساب':'حفظ التغييرات'}</button>
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button></div>`);
}
async function saveUser(id){
  const payload={
    name:document.getElementById("uf_name").value.trim(),
    username:document.getElementById("uf_user").value.trim(),
    password:document.getElementById("uf_pass").value,
    role:document.getElementById("uf_role").value,
    title:document.getElementById("uf_title").value.trim(),
    dept:document.getElementById("uf_dept").value.trim(),
    extraPerms:Array.from(document.querySelectorAll(".up_extra:checked")).map(x=>x.value)
  };
  if(!payload.name||!payload.username){ toast("الاسم واسم المستخدم مطلوبان","red"); return; }
  try{
    if(id){
      await api(`/users/${id}`,"PUT",payload);
      closeModal(); await refresh(); toast("تم حفظ التغييرات","green");
    }else{
      const r=await api("/users","POST",payload);
      closeModal(); await refresh();
      if(r.tempPassword) toast(`تم إنشاء الحساب — كلمة مرور مؤقتة: ${r.tempPassword}`,"green");
      else toast("تم إنشاء الحساب","green");
    }
  }catch(e){ toast(e.message,"red"); }
}
async function toggleActive(id){
  try{ const r=await api(`/users/${id}/toggle`,"POST"); await refresh(); toast(r.active?"تم تفعيل الحساب":"تم تعطيل الحساب",""); }
  catch(e){ toast(e.message,"red"); }
}

/* =========================================================
   PERMISSIONS matrix
   ========================================================= */
function permissionsView(){
  const roles=["admin","manager","employee"];
  const rows=Object.keys(PERMS).map(k=>{
    const cells=roles.map(r=>{

      return `<td><div class="pcell"><button class="tg ${on?'on':''}" ${locked?'disabled style="opacity:.5;cursor:not-allowed"':''} onclick="togglePerm('${r}','${k}')"></button></div></td>`;
    }).join("");
    return `<tr><td><div class="pnm">${PERMS[k].n}</div><div class="pds">${PERMS[k].d}</div></td>${cells}</tr>`;
  }).join("");
  return `
  <div class="card" style="margin-bottom:18px">
    <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
      <div class="kic ic-teal" style="position:static">🔑</div>
      <div style="flex:1"><h3 style="margin:0 0 4px;color:var(--ink)">مصفوفة صلاحيات الأدوار</h3>
      <p class="help">فعّل أو عطّل كل صلاحية لكل دور. تُطبَّق التغييرات فورًا على جميع المستخدمين ضمن الدور. دور «مدير النظام» يحتفظ بكامل الصلاحيات دائمًا.</p></div>
    </div>
  </div>
  <div class="card">
    <table class="pmatrix">
      <thead><tr><th>الصلاحية</th><th>مدير النظام</th><th>مشرف / مدير</th><th>موظف</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}
async function togglePerm(role,perm){
  if(role==="admin") return;
  try{ await api("/permissions","PUT",{role,perm}); await refresh(); }
  catch(e){ toast(e.message,"red"); }
}

/* =========================================================
   STATISTICS
   ========================================================= */
function statisticsView(){
  const quarter=q();
  const a=teamAgg(quarter);
  const emps=activeEmployees().filter(e=>targetOf(e.id,quarter)>0);
  // quality buckets
  let excellent=0,good=0,weak=0;
  emps.forEach(e=>reportsOf(e.id,quarter).filter(r=>r.status==="approved").forEach(r=>{
    const t=scoreReport(r).total; if(t>=90)excellent++; else if(t>=75)good++; else weak++;
  }));
  // trend across quarters
  const trend=QUARTERS.map(qq=>({label:qq.n.replace(" 2026",""),value:teamAgg(qq.id).pct}));
  // component averages
  const comps={timeliness:[],completeness:[],quality:[],closure:[]};
  emps.forEach(e=>reportsOf(e.id,quarter).filter(r=>r.status==="approved").forEach(r=>{
    const s=scoreReport(r); comps.timeliness.push(s.timeliness);comps.completeness.push(s.completeness);comps.quality.push(s.quality);comps.closure.push(s.closure);
  }));
  const avg=arr=>arr.length?Math.round(arr.reduce((x,y)=>x+y,0)/arr.length):0;
  const ranked=emps.map(e=>({e,pct:completionPct(e.id,quarter),avg:avgQualityOf(e.id,quarter),app:approvedOf(e.id,quarter),tgt:targetOf(e.id,quarter),late:lateCountOf(e.id,quarter),st:empStatus(e.id,quarter)})).sort((x,y)=>y.pct-x.pct||((y.avg||0)-(x.avg||0)));

  return `
  <div class="grid g4">
    ${kpi("","🎯","ic-ink","نسبة الإنجاز العامة",a.pct+"%",`<span class="help">${a.approved}/${a.required} تقرير</span>`)}
    ${kpi("teal","⭐","ic-teal","متوسط الجودة",a.avgQ+"%",`<span class="help">عبر ${a.count} تقرير معتمد</span>`)}
    ${kpi("red","⏰","ic-red","نسبة التأخير",a.required?Math.round(a.late/a.required*100)+"%":"0%",`<span class="help">${a.late} تقرير متأخر</span>`)}
    ${kpi("green","👤","ic-green","مكتملو المتطلبات",emps.filter(e=>remainingOf(e.id,quarter)===0).length,`<span class="help">من ${emps.length} موظف</span>`)}
  </div>

  <div class="grid g2" style="margin-top:18px">
    <div class="card"><div class="card-h"><h3>مكوّنات التقييم (المتوسط)</h3><span class="card-h sub" style="margin-inline-start:auto">النموذج الموزون</span></div>
      ${vbars([
        {label:"الالتزام الزمني",value:avg(comps.timeliness),color:"linear-gradient(180deg,#3f9a97,#2D8C8A)"},
        {label:"الاكتمال",value:avg(comps.completeness),color:"linear-gradient(180deg,#4f8fb0,#2F6B8A)"},
        {label:"الجودة",value:avg(comps.quality),color:"linear-gradient(180deg,#4fa37c,#3B8D6A)"},
        {label:"كفاءة الإغلاق",value:avg(comps.closure),color:"linear-gradient(180deg,#d6b45a,#C89B3C)"}
      ],100,"%")}
    </div>
    <div class="card"><div class="card-h"><h3>اتجاه الإنجاز عبر الأرباع</h3></div>
      ${vbars(trend.map(t=>({label:t.label,value:t.value,color:t.label.includes("الثالث")?"linear-gradient(180deg,#3f9a97,#2D8C8A)":"linear-gradient(180deg,#9fb6c3,#7d97a7)"})),100,"%")}
    </div>
  </div>

  <div class="grid g2" style="margin-top:18px;grid-template-columns:.8fr 1.2fr">
    <div class="card"><div class="card-h"><h3>توزيع جودة التقارير</h3></div>
      <div style="display:flex;align-items:center;justify-content:center;padding:6px 0">
        ${donut([{value:excellent,color:"#3B8D6A"},{value:good,color:"#C89B3C"},{value:weak,color:"#B85C5C"}],180,(excellent+good+weak),"تقرير معتمد")}
      </div>
      <div class="legend">
        <div class="lg"><span class="dot" style="background:#3B8D6A"></span>ممتاز ≥90% (${excellent})</div>
        <div class="lg"><span class="dot" style="background:#C89B3C"></span>جيد 75–89% (${good})</div>
        <div class="lg"><span class="dot" style="background:#B85C5C"></span>يحتاج تطوير (${weak})</div>
      </div>
    </div>
    <div class="card pad0"><div style="padding:18px 20px"><h3 style="margin:0;font-size:17px;color:var(--ink)">ترتيب الموظفين حسب الالتزام</h3></div>
      <div class="tbl-wrap"><table class="table">
        <thead><tr><th>#</th><th>الموظف</th><th>الإنجاز</th><th>الجودة</th><th>متأخر</th><th>الحالة</th></tr></thead>
        <tbody>${ranked.map((x,i)=>`<tr>
          <td style="font-weight:800;color:${i<3?'var(--amber)':'var(--muted2)'}">${i+1}</td>
          <td><div class="uname"><div class="uav">${initials(x.e.name)}</div><div class="nm">${x.e.name}</div></div></td>
          <td><div style="display:flex;align-items:center;gap:8px"><div class="prog" style="width:70px"><i style="width:${x.pct}%"></i></div><b>${x.pct}%</b></div></td>
          <td><b style="color:${(x.avg||0)>=85?'var(--green)':'var(--amber)'}">${x.avg!=null?x.avg+'%':'—'}</b></td>
          <td>${x.late>0?`<span class="badge b-red">${x.late}</span>`:'<span class="tag">0</span>'}</td>
          <td><span class="badge ${x.st.cls}">${x.st.n}</span></td>
        </tr>`).join("")}</tbody></table></div>
    </div>
  </div>`;
}

/* =========================================================
   SETTINGS
   ========================================================= */
function settingsView(){
  const w=DB.settings.weights;
  const sum=w.timeliness+w.completeness+w.quality+w.closure;
  const wrow=(k,label,desc)=>`<div class="slider-row"><div class="sh"><label>${label}</label><span class="val" id="sw_${k}v">${w[k]}%</span></div>
    <div class="help" style="margin-bottom:8px">${desc}</div>
    <input type="range" id="sw_${k}" min="0" max="60" value="${w[k]}" oninput="document.getElementById('sw_${k}v').textContent=this.value+'%';sumWeights()"></div>`;
  const typeRows=DB.reportTypes.map(t=>`<tr><td style="font-weight:700;color:var(--ink)">${t.n}</td><td><span class="tag">وزن ×${t.w}</span></td></tr>`).join("");
  return `
  <div class="grid g2" style="align-items:start">
    <div class="card">
      <div class="card-h"><h3>أوزان نموذج التقييم</h3><span class="card-h sub" style="margin-inline-start:auto">المجموع يجب أن يكون 100%</span></div>
      ${wrow("timeliness","الالتزام الزمني","نسبة الالتزام تُحتسب آليًا من موعد الرفع مقابل الاستحقاق.")}
      ${wrow("completeness","اكتمال التقرير","استكمال الحقول والمرفقات المطلوبة، يقيّمها المشرف.")}
      ${wrow("quality","جودة التحليل","دقة المؤشرات ووضوح الاستنتاجات، يقيّمها المشرف.")}
      ${wrow("closure","كفاءة الإغلاق","تُحتسب آليًا؛ كلما قلّت الإعادات ارتفعت الدرجة.")}
      <div class="divider"></div>
      <div style="display:flex;align-items:center;gap:12px">
        <div id="sw_sum" class="badge ${sum===100?'b-green':'b-red'}">المجموع: ${sum}%</div>
        <button class="btn btn-primary" style="margin-inline-start:auto" onclick="saveWeights()">حفظ الأوزان</button>
      </div>
      <p class="help" style="margin-top:12px">يُعاد احتساب درجات جميع التقارير المعتمدة فور تغيير الأوزان.</p>
    </div>
    <div>
      <div class="card" style="margin-bottom:18px">
        <div class="card-h"><h3>هوية النظام</h3></div>
        <div class="field"><label>اسم الإدارة</label><input id="st_org" value="${DB.settings.orgName}"></div>
        <div class="field"><label>اسم البرنامج</label><input id="st_prog" value="${DB.settings.program}"></div>
        <button class="btn btn-primary" onclick="saveOrg()">حفظ</button>
      </div>
      <div class="card" style="margin-bottom:18px">
        <div class="card-h"><h3>أنواع التقارير</h3></div>
        <table class="table"><tbody>${typeRows}</tbody></table>
      </div>
      <div class="card">
        <div class="card-h"><h3>كلمة المرور الخاصة بك</h3></div>
        <div class="field"><label>كلمة المرور الحالية</label><input id="pw_cur" type="password" placeholder="••••••••"></div>
        <div class="field"><label>كلمة المرور الجديدة (6 أحرف فأكثر)</label><input id="pw_new" type="password" placeholder="••••••••"></div>
        <button class="btn btn-primary" onclick="changePassword()">تحديث كلمة المرور</button>
      </div>
    </div>
  </div>`;
}
function sumWeights(){
  const s=["timeliness","completeness","quality","closure"].reduce((a,k)=>a+ +document.getElementById("sw_"+k).value,0);
  const el=document.getElementById("sw_sum"); el.textContent="المجموع: "+s+"%"; el.className="badge "+(s===100?'b-green':'b-red');
}
async function saveWeights(){
  const w={}; ["timeliness","completeness","quality","closure"].forEach(k=>w[k]=+document.getElementById("sw_"+k).value);
  const s=w.timeliness+w.completeness+w.quality+w.closure;
  if(s!==100){ toast("يجب أن يكون مجموع الأوزان 100%","red"); return; }
  try{ await api("/settings/weights","PUT",w); await refresh(); toast("تم حفظ الأوزان وإعادة احتساب الدرجات","green"); }
  catch(e){ toast(e.message,"red"); }
}
async function saveOrg(){
  const payload={orgName:document.getElementById("st_org").value.trim(),program:document.getElementById("st_prog").value.trim()};
  try{ await api("/settings/org","PUT",payload); await refresh(); toast("تم الحفظ","green"); }
  catch(e){ toast(e.message,"red"); }
}
async function changePassword(){
  const cur=document.getElementById("pw_cur").value, nw=document.getElementById("pw_new").value;
  if(!nw||nw.length<6){ toast("كلمة المرور الجديدة يجب ألا تقل عن 6 أحرف","red"); return; }
  try{ await api("/me/password","POST",{current:cur,next:nw}); document.getElementById("pw_cur").value="";document.getElementById("pw_new").value=""; toast("تم تحديث كلمة المرور","green"); }
  catch(e){ toast(e.message,"red"); }
}

/* =========================================================
   ACTIVITY
   ========================================================= */
function activityView(){
  const icon={approve:"✅",submit:"📤",return:"↩️",user:"👤",perm:"🔑",target:"🎯",settings:"⚙️",auth:"🔐",info:"•"};
  const cls={approve:"ic-green",submit:"ic-blue",return:"ic-amber",user:"ic-ink",perm:"ic-teal",target:"ic-teal",settings:"ic-ink",auth:"ic-blue",info:"ic-ink"};
  const rows=DB.activity.map(a=>{const actor=userById(a.actor);
    return `<div class="mstat"><div class="mi ${cls[a.type]||'ic-ink'}">${icon[a.type]||'•'}</div>
      <div><div class="ml">${a.action}</div><div class="md">${actor?actor.name:'—'} • ${fmtDate(a.ts)}</div></div></div>`;}).join("");
  return `<div class="card"><div class="card-h"><h3>سجل النشاط</h3><span class="card-h sub" style="margin-inline-start:auto">${DB.activity.length} إجراء موثّق</span></div>
    ${rows||'<p class="help">لا توجد إجراءات بعد.</p>'}</div>`;

/* =========================================================
   NOTIFICATIONS
   ========================================================= */
function openNotifs(){
  const u=me(); let items=[];
  if(u.role==="employee"){
    reportsOf(u.id,q()).forEach(r=>{
      if(isLate(r)) items.push({ic:"⏰",cls:"ic-red",t:`تقرير «${r.title}» متأخر`,d:`استحقاق ${fmtShort(r.dueDate)}`});
      else if(r.status==="returned") items.push({ic:"↩️",cls:"ic-amber",t:`أُعيد «${r.title}» للتعديل`,d:r.returnReason||''});
    });
  } else {
    reviewQueue(q()).forEach(r=>{const e=userById(r.employeeId);items.push({ic:"🔍",cls:"ic-blue",t:`«${r.title}» بانتظار الاعتماد`,d:`${e.name} • رُفع ${fmtShort(r.uploadDate)}`});});
    employees().forEach(e=>reportsOf(e.id,q()).filter(isLate).forEach(r=>items.push({ic:"⏰",cls:"ic-red",t:`تأخر «${r.title}»`,d:`${e.name} • استحقاق ${fmtShort(r.dueDate)}`})));
  }
  openModal(`
    <div class="modal-h"><div><h3>التنبيهات</h3><div class="sub">${items.length} تنبيه</div></div><button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-b">${items.length?items.map(i=>`<div class="mstat"><div class="mi ${i.cls}">${i.ic}</div><div><div class="ml">${i.t}</div><div class="md">${i.d}</div></div></div>`).join(""):'<div class="empty"><div class="ei">🔔</div><h4>لا توجد تنبيهات</h4><p>كل شيء على ما يرام.</p></div>'}</div>`);
}

/* =========================================================
   MODAL + TOAST
   ========================================================= */
function openModal(html){ document.getElementById("modal").innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`; }
function closeModal(){ document.getElementById("modal").innerHTML=""; }
let _toastT=null;
function toast(msg,kind){
  clearTimeout(_toastT);
  document.getElementById("toast").innerHTML=`<div class="toast ${kind||''}">${kind==='green'?'✓':kind==='red'?'⚠️':'ℹ️'} ${msg}</div>`;
  _toastT=setTimeout(()=>{document.getElementById("toast").innerHTML="";},2800);
}

   INIT

    await refresh();           // if a valid session cookie exists, this loads the dashboard
